# Render Deployment Configuration
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: akhdar-perfumes
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build:css
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

databases:
  - name: akhdar-perfumes-db
    databaseName: akhdar_perfumes
    plan: starter
    region: oregon
